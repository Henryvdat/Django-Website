{% extends "admin/change_form.html" %}

{% block object-tools-items %}
    <li>
        <form method="post" action="{% url 'admin:bootstrapoverrides_reset' object_id %}"
              onsubmit="return confirm('Reset to default Bootstrap overrides? Any changes you have made will be lost.');">
            {% csrf_token %}
            <button type="submit"
                    style="background:#c0392b; color:#fff; border:none; padding:6px 14px;
                           border-radius:4px; cursor:pointer; font-size:13px; font-weight:600;">
                ↺ Reset to Default
            </button>
        </form>
    </li>
    {{ block.super }}
{% endblock %}
