{% extends 'base.html' %}
{% load markdown_extras %}

{% block content %}

<div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="mb-0">Home</h1>
    {% if user.is_staff %}
        <a href="{% url 'add_block_home' %}" class="btn btn-sm btn-outline-primary">+ Add Block</a>
    {% endif %}
</div>

{% include '_block_list.html' with blocks=blocks %}

{% if pages %}
<div class="row mt-4">
    {% for page in pages %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h5>{{ page.title }}</h5>
                <a href="{{ page.get_absolute_url }}" class="btn btn-primary mt-2">Read More</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}

{% endblock %}
