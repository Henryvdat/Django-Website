<!DOCTYPE html>
<html>
<head>
    <title>My CMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            Shoppalist
        </a>
    </div>
</nav>

<div class="container mt-5">

    <div class="row">

        <div class="col-md-9">
            {% block content %}{% endblock %}
        </div>

        <div class="col-md-3">

            <div class="card shadow-sm">

                <div class="card-header bg-dark text-white">
                    Navigation
                </div>

                <div class="list-group list-group-flush">

                    <a href="{% url 'home' %}"
                       class="list-group-item list-group-item-action">
                        Home
                    </a>

                    <a href="{% url 'page_detail' slug='about' %}"
                       class="list-group-item list-group-item-action">
                        About
                    </a>

                    <a href="{% url 'page_detail' slug='products' %}"
                       class="list-group-item list-group-item-action">
                        Products
                    </a>

                    <a href="{% url 'page_detail' slug='contact' %}"
                       class="list-group-item list-group-item-action">
                        Contact
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% if footer %}
<footer class="mt-5 py-4 border-top bg-dark text-white">
    <div class="container">
        <p class="mb-1">{{ footer.text }}</p>
        <small class="text-muted">{{ footer.copyright_text }}</small>
    </div>
</footer>
{% endif %}

</body>
</html>
